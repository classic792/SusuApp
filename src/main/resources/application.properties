spring.datasource.url=${DB_URL}?ssl-mode=REQUIRED
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=${PORT:8080}

logging.level.org.springframework.core.env=DEBUG

spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION}

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173

# Arkesel SMS Configuration
arkesel.api.key=${ARKESEL_API_KEY}
arkesel.sender.id=${ARKESEL_SENDER_ID}

# Face++ Configuration
faceplusplus.api.key=${FACEPLUSPLUS_API_KEY}
faceplusplus.api.secret=${FACEPLUSPLUS_API_SECRET}
faceplusplus.compare.threshold=${FACEPLUSPLUS_COMPARE_THRESHOLD}

# Request Size Limits (For Base64 Images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


